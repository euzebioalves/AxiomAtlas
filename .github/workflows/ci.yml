name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Axiom.Atlas.slnx

      - name: Build
        run: dotnet build Axiom.Atlas.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Axiom.Atlas.slnx --configuration Release --no-build --no-restore
