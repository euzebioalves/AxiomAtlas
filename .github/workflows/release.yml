name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Determine release version
        id: version
        shell: pwsh
        run: |
          $tagPattern = '^v(\d+)\.(\d+)\.(\d+)$'
          $currentTag = git tag --points-at HEAD --list 'v*' |
            Where-Object { $_ -match $tagPattern } |
            Sort-Object -Descending |
            Select-Object -First 1

          if ($currentTag) {
            $version = $currentTag.Substring(1)
          }
          else {
            $latestTag = git tag --list 'v*' --sort=-version:refname |
              Where-Object { $_ -match $tagPattern } |
              Select-Object -First 1

            if (-not $latestTag) {
              $version = '1.0.1'
            }
            else {
              $latestTag -match $tagPattern | Out-Null
              $version = '{0}.{1}.{2}' -f $Matches[1], $Matches[2], ([int]$Matches[3] + 1)
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore Axiom.Atlas.slnx

      - name: Validate release build
        run: dotnet build Axiom.Atlas.slnx --configuration Release --no-restore

      - name: Publish applications
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $properties = @(
            "/p:Version=$env:RELEASE_VERSION",
            "/p:AssemblyVersion=$env:RELEASE_VERSION",
            "/p:FileVersion=$env:RELEASE_VERSION",
            "/p:InformationalVersion=$env:RELEASE_VERSION+$env:GITHUB_SHA",
            '/p:IncludeSourceRevisionInInformationalVersion=false'
          )

          dotnet publish Axiom.Atlas.API/Axiom.Atlas.API.csproj --configuration Release --no-restore --output artifacts/api @properties
          dotnet publish Axiom.Atlas.Web/Axiom.Atlas.Web.csproj --configuration Release --no-restore --output artifacts/web @properties

      - name: Create release packages
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path artifacts/api/* -DestinationPath "release/AxiomAtlas-API-$env:RELEASE_VERSION.zip"
          Compress-Archive -Path artifacts/web/* -DestinationPath "release/AxiomAtlas-Web-$env:RELEASE_VERSION.zip"

      - name: Create version tag
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          if (-not (git tag --list $tag)) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git tag --annotate $tag --message "Release $env:RELEASE_VERSION"
            git push origin $tag
          }

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          $assets = Get-ChildItem release/*.zip | ForEach-Object FullName

          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber --repo $env:GITHUB_REPOSITORY
          }
          else {
            gh release create $tag $assets --title "Axiom Atlas $env:RELEASE_VERSION" --generate-notes --repo $env:GITHUB_REPOSITORY
          }
